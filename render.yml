services:
  - type: web
    name: personal-intake-api
    runtime: python
    rootDir: intake-api
    plan: free
    buildCommand: pip install poetry && poetry config virtualenvs.create false && poetry install --no-interaction --no-ansi
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: CORS_ALLOWED_ORIGINS
        value: https://ana-stanojevic.com,https://www.ana-stanojevic.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false